<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>賭博默示錄-地下王國</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body { 
            margin: 0; 
            display: flex; 
            flex-direction: row;
            height: 100vh; 
            height: 100dvh; /* 相容行動端動態視窗高度 */
            background: #121212; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            user-select: none;
            overflow: hidden;
        }

        /* 左邊區域 */
        .left-panel { 
            position: relative; 
            width: 75%; 
            height: 100%;
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            border-right: 2px solid #2d2d2d; 
            background: radial-gradient(circle, #1a2a1a 0%, #0d130d 100%); 
            overflow: hidden; 
            padding: 20px;
        }

        /* 背景「帝」字 Logo：使用 clamp 自適應大小 */
        .left-panel::before {
            content: "帝";
            position: absolute;
            width: clamp(280px, 45vw, 480px);
            height: clamp(280px, 45vw, 480px);
            border-radius: 50%;
            border: clamp(8px, 1.5vw, 15px) double rgba(212, 175, 55, 0.15); 
            background: rgba(0, 0, 0, 0.2);
            color: rgba(212, 175, 55, 0.08); 
            font-family: "DFKai-SB", "BiauKai", "楷體", "Kaiti SC", cursive; 
            font-size: clamp(220px, 38vw, 420px);
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), inset 0 0 30px rgba(212, 175, 55, 0.05);
            pointer-events: none; 
            z-index: 0; 
        }

        /* 右邊歷史區域 */
        .right-panel { 
            width: 25%; 
            height: 100%;
            padding: 20px 15px; 
            background: #1c1c1e; 
            box-shadow: inset 5px 0 10px rgba(0,0,0,0.5);
            z-index: 1;
            display: flex;
            flex-direction: column;
        }

        .right-panel h3 {
            margin: 0 0 15px 0;
            padding-bottom: 12px;
            border-bottom: 2px solid #3a3a3c;
            text-align: center;
            letter-spacing: 2px;
            color: #aeaeb2;
            font-size: clamp(16px, 1.8vw, 20px);
            flex-shrink: 0;
        }

        #historyBox {
            flex-grow: 1;
            overflow-y: auto; /* 紀錄過多時可獨立滾動 */
        }

        /* 骰子容器 */
        .dice-container { 
            position: relative;
            z-index: 1; 
            display: flex; 
            gap: clamp(15px, 3vw, 30px); 
            font-size: clamp(60px, 10vw, 110px); 
            margin-bottom: clamp(20px, 4vh, 50px); 
            text-shadow: 0px 5px 15px rgba(0,0,0,0.8);
        }
        
        /* 按鈕與 Hitbox */
        .btn-wrapper {
            position: relative;
            z-index: 1; 
            display: inline-block;
        }

        .btn { 
            padding: clamp(12px, 2vh, 20px) clamp(40px, 6vw, 80px); 
            font-size: clamp(18px, 2.2vw, 26px); 
            font-weight: bold;
            cursor: pointer; 
            background: #ff3b30; 
            color: white; 
            border: none; 
            border-radius: 50px; 
            box-shadow: 0 8px 20px rgba(255, 59, 48, 0.4);
            letter-spacing: 2px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn:disabled { 
            background: #3a3a3c; 
            color: #8e8e93; 
            cursor: not-allowed; 
            box-shadow: none; 
        }
        
        .hitbox-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50px;
            overflow: hidden;
            pointer-events: none; 
            display: block; 
        }

        .hitbox {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(9px, 1vw, 12px);
            font-weight: bold;
            color: white;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        /* 結果顯示 */
        .result { 
            position: relative;
            z-index: 1;
            font-size: clamp(22px, 3.5vw, 36px); 
            font-weight: bold;
            margin-top: clamp(20px, 3vh, 40px); 
            min-height: 45px; 
            text-align: center;
        }
        
        /* 歷史記錄 */
        .history-item { 
            padding: 10px 8px; 
            border-bottom: 1px solid #2c2c2e; 
            font-size: clamp(14px, 1.5vw, 18px); 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-text { font-weight: 500; }
        .history-details { 
            color: #8e8e93; 
            font-family: monospace; 
            font-size: clamp(22px, 2.5vw, 32px); 
        }
        
        .big { color: #ff453a; } 
        .small { color: #0a84ff; } 
        .all-three { color: #ffd60a; font-weight: bold; }
        
        .tip { 
            position: relative; 
            z-index: 1; 
            margin-top: 15px; 
            color: #636366; 
            font-size: clamp(10px, 1.2vw, 12px); 
            text-align: center;
        }

        /* 📱 iPad 直立模式及手機 (螢幕寬度小於 768px 或垂直方向時) */
        @media (max-width: 768px), (orientation: portrait) {
            body {
                flex-direction: column;
            }

            .left-panel {
                width: 100%;
                height: 65%;
                border-right: none;
                border-bottom: 2px solid #2d2d2d;
            }

            .right-panel {
                width: 100%;
                height: 35%;
                box-shadow: inset 0 5px 10px rgba(0,0,0,0.5);
            }
        }
    </style>
</head>
<body>

    <!-- 左邊：搖骰互動區 -->
    <div class="left-panel">
        <div class="dice-container" id="diceBox">⚀ ⚀ ⚀</div>
        
        <div class="btn-wrapper" id="btnWrapper">
            <button class="btn" id="rollBtn" onclick="startRollAnimation()">開始搖骰</button>
            
        </div>
        
        <div class="result" id="resultBox"></div>
    </div>

    <!-- 右邊：歷史趨勢面板 -->
    <div class="right-panel">
        <h3>過去 10 次結果</h3>
        <div id="historyBox"></div>
    </div>

    <script>
        let historyList = [];
        const diceIcons = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];

        function startRollAnimation() {
            const btn = document.getElementById('rollBtn');
            const diceBox = document.getElementById('diceBox');
            btn.disabled = true;
            
            let count = 0;
            let interval = setInterval(() => {
                let r1 = Math.floor(Math.random() * 6);
                let r2 = Math.floor(Math.random() * 6);
                let r3 = Math.floor(Math.random() * 6);
                diceBox.innerText = `${diceIcons[r1]} ${diceIcons[r2]} ${diceIcons[r3]}`;
                count++;
                
                if(count >= 12) {
                    clearInterval(interval);
                    finalizeResult(); 
                }
            }, 50);
        }

        function finalizeResult() {
            let d1, d2, d3;
            let diceResult = [];
            let rng = Math.random() * 100; 


            d1 = Math.floor(Math.random() * 6) + 1;
            d2 = Math.floor(Math.random() * 6) + 1;
            d3 = Math.floor(Math.random() * 6) + 1;

            document.getElementById('diceBox').innerText = `${diceIcons[d1-1]} ${diceIcons[d2-1]} ${diceIcons[d3-1]}`;
            
            let total = d1 + d2 + d3;
            let titleText = "";
            let typeClass = "";
            
            if (d1 === d2 && d2 === d3) {
                titleText = `圍骰 ${total}點`;
                typeClass = "all-three";
            } else if (total >= 11) {
                titleText = `大 ${total}點`;
                typeClass = "big";
            } else {
                titleText = `細 ${total}點`;
                typeClass = "small";
            }
            
            document.getElementById('resultBox').innerHTML = `<span class="${typeClass}">結果：${titleText}</span>`;
            
            let newHistoryHTML = `
                <div class="history-item">
                    <span class="history-text ${typeClass}">${titleText}</span>
                    <span class="history-details">${diceIcons[d1-1]} ${diceIcons[d2-1]} ${diceIcons[d3-1]}</span>
                </div>
            `;
            
            historyList.unshift(newHistoryHTML);
            if (historyList.length > 10) historyList.pop();
            document.getElementById('historyBox').innerHTML = historyList.join('');
            
            document.getElementById('rollBtn').disabled = false;
        }
    </script>
</body>
</html>
